# Bygger React-appen i Frontend/myreactapp och publicerar till GitHub Pages.
# Aktivera: Settings → Pages → Source: GitHub Actions
name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/myreactapp/package-lock.json

      - name: Install and build
        working-directory: Frontend/myreactapp
        run: npm ci && npm run build

      - name: SPA fallback (undvik 404 vid omladdning)
        run: cp Frontend/myreactapp/build/index.html Frontend/myreactapp/build/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/myreactapp/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
